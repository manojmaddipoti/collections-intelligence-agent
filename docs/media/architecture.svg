<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Collections Intelligence Agent architecture</title>
  <desc id="desc">Architecture diagram showing user, ADK agents, MCP server, server-side masking, and SQLite database.</desc>
  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="60" y="70" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700" fill="#172126">Architecture</text>
  <text x="60" y="110" font-family="Inter, Arial, sans-serif" font-size="20" fill="#58656b">ADK multi-agent routing with MCP data access and server-side safety controls</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#172126"/>
    </marker>
  </defs>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="70" y="285" width="170" height="90" rx="8" fill="#f6f7f2" stroke="#172126" stroke-width="2"/>
    <text x="112" y="322" font-size="22" font-weight="700" fill="#172126">User</text>
    <text x="96" y="350" font-size="17" fill="#46545a">ADK Web or CLI</text>

    <rect x="320" y="260" width="220" height="140" rx="8" fill="#e6f2ef" stroke="#2e6f63" stroke-width="2"/>
    <text x="356" y="315" font-size="24" font-weight="700" fill="#173d36">Orchestrator</text>
    <text x="356" y="345" font-size="18" fill="#173d36">Routes requests</text>
    <text x="356" y="374" font-size="18" fill="#173d36">Approves drafts</text>

    <rect x="630" y="160" width="235" height="105" rx="8" fill="#eef0fb" stroke="#4757a8" stroke-width="2"/>
    <text x="660" y="205" font-size="23" font-weight="700" fill="#253078">Financial Analyst</text>
    <text x="660" y="234" font-size="18" fill="#253078">Aging and risk</text>

    <rect x="630" y="395" width="235" height="105" rx="8" fill="#fff2dd" stroke="#aa6a20" stroke-width="2"/>
    <text x="660" y="440" font-size="23" font-weight="700" fill="#63390d">Communications</text>
    <text x="660" y="469" font-size="18" fill="#63390d">Drafts only</text>

    <rect x="945" y="260" width="190" height="140" rx="8" fill="#f4eeee" stroke="#8f3d45" stroke-width="2"/>
    <text x="980" y="315" font-size="24" font-weight="700" fill="#55232a">MCP Server</text>
    <text x="980" y="345" font-size="18" fill="#55232a">Tool layer</text>
    <text x="980" y="374" font-size="18" fill="#55232a">PII masking</text>

    <rect x="765" y="610" width="250" height="80" rx="8" fill="#172126"/>
    <text x="808" y="644" font-size="22" font-weight="700" fill="#ffffff">SQLite</text>
    <text x="808" y="672" font-size="18" fill="#d7dddf">Synthetic AR data</text>
  </g>

  <path d="M240 330 L310 330" stroke="#172126" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M540 300 L620 220" stroke="#172126" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M540 360 L620 448" stroke="#172126" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M865 213 C905 215 915 285 935 310" stroke="#172126" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M865 448 C905 446 915 376 935 350" stroke="#172126" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M1040 400 C1040 510 980 580 915 605" stroke="#172126" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M430 400 C430 560 620 650 755 650" stroke="#172126" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <text x="60" y="714" font-family="Inter, Arial, sans-serif" font-size="18" fill="#58656b">No real data. No send-email tool. Draft approval changes internal status only.</text>
</svg>
